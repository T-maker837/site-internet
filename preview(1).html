<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>PhoneTracker — Dashboard</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>
  <script src="config.js"></script>
  <style>
    :root{
      --bg:#060c1a; --bg2:#0c1428; --glass:rgba(255,255,255,0.04);
      --glass2:rgba(255,255,255,0.07); --border:rgba(255,255,255,0.08);
      --bd2:rgba(255,255,255,0.13); --accent:#818cf8; --accentD:#6366f1;
      --green:#4ade80; --amber:#fbbf24; --red:#f87171;
      --text:#f1f5f9; --muted:#94a3b8; --dim:#475569;
    }
    *,*::before,*::after{margin:0;padding:0;box-sizing:border-box;}
    html,body{height:100%;overflow:hidden;}
    body{font-family:'Inter',sans-serif;background:var(--bg);color:var(--text);display:flex;flex-direction:column;}

    /* HEADER */
    header{
      flex-shrink:0; height:58px; background:rgba(6,12,26,0.95);
      border-bottom:1px solid var(--border); backdrop-filter:blur(20px);
      display:flex; align-items:center; padding:0 20px; gap:16px; z-index:1000;
    }
    .logo-wrap{display:flex;align-items:center;gap:10px;flex-shrink:0;}
    .logo-icon-h{font-size:1.5rem;filter:drop-shadow(0 0 12px rgba(129,140,248,0.8));}
    .logo-text{
      font-size:1.1rem; font-weight:800; letter-spacing:-0.03em;
      background:linear-gradient(135deg,#818cf8,#c084fc);
      -webkit-background-clip:text; -webkit-text-fill-color:transparent; background-clip:text;
    }
    .hdiv{width:1px;height:24px;background:var(--border);flex-shrink:0;}
    .stat-pills{display:flex;gap:8px;flex:1;}
    .pill{
      padding:5px 12px; border-radius:99px; background:var(--glass);
      border:1px solid var(--border); font-size:0.78rem; font-weight:500; color:var(--muted);
      display:flex; align-items:center; gap:6px;
    }
    .pill-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0;}
    .live-clock{font-size:0.82rem;font-weight:600;color:var(--dim);flex-shrink:0;font-variant-numeric:tabular-nums;}
    .btn-h{
      padding:7px 14px; border-radius:10px; border:none; cursor:pointer;
      font-family:'Inter',sans-serif; font-size:0.78rem; font-weight:600;
      transition:all 0.2s; flex-shrink:0; white-space:nowrap;
    }
    .btn-h-primary{
      background:linear-gradient(135deg,#6366f1,#8b5cf6); color:white;
      box-shadow:0 2px 12px rgba(99,102,241,0.3);
    }
    .btn-h-primary:hover{box-shadow:0 4px 20px rgba(99,102,241,0.45);transform:translateY(-1px);}
    .btn-h-secondary{
      background:var(--glass); color:var(--muted);
      border:1px solid var(--border);
    }
    .btn-h-secondary:hover{background:var(--glass2);}

    /* LAYOUT */
    .layout{display:flex;flex:1;overflow:hidden;}

    /* SIDEBAR */
    .sidebar{
      width:295px; flex-shrink:0; background:var(--bg2);
      border-right:1px solid var(--border); display:flex;
      flex-direction:column; overflow:hidden;
    }
    .sidebar-top{padding:12px 12px 10px;border-bottom:1px solid var(--border);flex-shrink:0;}
    .search-wrap{position:relative;margin-bottom:10px;}
    .search-wrap input{
      width:100%; background:var(--glass); border:1px solid var(--border);
      border-radius:12px; padding:9px 12px 9px 36px; color:var(--text);
      font-family:'Inter',sans-serif; font-size:0.83rem; outline:none;
      transition:border-color 0.2s, box-shadow 0.2s;
    }
    .search-wrap input:focus{border-color:rgba(129,140,248,0.5);box-shadow:0 0 0 3px rgba(99,102,241,0.1);}
    .search-wrap input::placeholder{color:var(--dim);}
    .search-icon{position:absolute;left:11px;top:50%;transform:translateY(-50%);font-size:0.85rem;pointer-events:none;}
    .filters{display:flex;gap:5px;}
    .fchip{
      flex:1; padding:6px 4px; border-radius:9px; border:1px solid var(--border);
      background:transparent; color:var(--muted); font-family:'Inter',sans-serif;
      font-size:0.72rem; font-weight:500; cursor:pointer; transition:all 0.2s;
    }
    .fchip.active{background:rgba(99,102,241,0.18);border-color:rgba(129,140,248,0.5);color:var(--accent);}

    .device-list{flex:1;overflow-y:auto;padding:10px;}
    .device-list::-webkit-scrollbar{width:3px;}
    .device-list::-webkit-scrollbar-track{background:transparent;}
    .device-list::-webkit-scrollbar-thumb{background:var(--border);border-radius:99px;}

    /* DEVICE CARD */
    .dcard{
      background:var(--glass); border:1px solid var(--border);
      border-radius:15px; padding:12px; margin-bottom:8px;
      cursor:pointer; transition:all 0.2s; position:relative; overflow:hidden;
    }
    .dcard::before{
      content:''; position:absolute; inset:0;
      background:linear-gradient(135deg,rgba(99,102,241,0.05),transparent);
      opacity:0; transition:opacity 0.2s;
    }
    .dcard:hover{border-color:var(--bd2);transform:translateX(2px);}
    .dcard:hover::before{opacity:1;}
    .dcard.selected{border-color:rgba(129,140,248,0.5);background:rgba(99,102,241,0.08);}
    .dcard.selected::before{opacity:1;}
    .dcard-top{display:flex;align-items:center;gap:10px;margin-bottom:10px;}
    .d-avatar{
      width:38px; height:38px; border-radius:12px;
      background:linear-gradient(135deg,rgba(99,102,241,0.3),rgba(139,92,246,0.3));
      border:1px solid rgba(129,140,248,0.3);
      display:flex; align-items:center; justify-content:center;
      font-size:1.3rem; flex-shrink:0;
    }
    .d-info{flex:1;min-width:0;}
    .d-name{font-size:0.87rem;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
    .d-city{font-size:0.74rem;color:var(--muted);margin-top:2px;}
    .d-sdot{width:9px;height:9px;border-radius:50%;flex-shrink:0;}
    .d-sdot.online {background:var(--green);box-shadow:0 0 6px rgba(74,222,128,0.6);animation:sdot 2s infinite;}
    .d-sdot.moving {background:var(--amber);box-shadow:0 0 6px rgba(251,191,36,0.6); animation:sdot 1.2s infinite;}
    .d-sdot.offline{background:var(--dim);}
    @keyframes sdot{0%,100%{transform:scale(1);}50%{transform:scale(1.3);}}
    .dcard-bottom{display:flex;align-items:center;gap:8px;}
    .bat-wrap{flex:1;height:4px;background:rgba(255,255,255,0.07);border-radius:99px;overflow:hidden;}
    .bat-fill{height:100%;border-radius:99px;transition:width 0.5s ease;}
    .d-meta{display:flex;gap:7px;}
    .d-meta-item{font-size:0.7rem;color:var(--dim);display:flex;align-items:center;gap:3px;}

    .empty-state{text-align:center;padding:40px 20px;color:var(--dim);font-size:0.83rem;line-height:1.7;}
    .empty-state .ei{font-size:2rem;display:block;margin-bottom:10px;}

    /* MAP */
    .map-area{flex:1;position:relative;overflow:hidden;}
    #map{width:100%;height:100%;}

    /* DETAIL PANEL */
    .detail-panel{
      position:absolute; top:16px; right:16px; width:265px;
      background:rgba(12,20,40,0.93); border:1px solid var(--bd2);
      border-radius:20px; padding:18px; backdrop-filter:blur(24px);
      z-index:800; display:none;
      box-shadow:0 8px 40px rgba(0,0,0,0.5);
    }
    .detail-panel.open{display:block;animation:panelIn .25s cubic-bezier(.16,1,.3,1);}
    @keyframes panelIn{from{opacity:0;transform:translateY(8px) scale(.97);}to{opacity:1;transform:translateY(0) scale(1);}}
    .dp-head{display:flex;align-items:center;gap:10px;margin-bottom:16px;}
    .dp-emoji{font-size:1.8rem;}
    .dp-name{font-size:0.93rem;font-weight:700;flex:1;}
    .dp-close{
      background:var(--glass2); border:1px solid var(--border); border-radius:8px;
      color:var(--muted); width:26px; height:26px; display:flex;
      align-items:center; justify-content:center; cursor:pointer;
      font-size:0.78rem; transition:all 0.2s;
    }
    .dp-close:hover{background:rgba(248,113,113,0.15);border-color:rgba(248,113,113,0.3);color:var(--red);}
    .dp-row{display:flex;justify-content:space-between;align-items:center;padding:7px 0;border-bottom:1px solid var(--border);font-size:0.79rem;}
    .dp-row:last-child{border-bottom:none;}
    .dp-lbl{color:var(--muted);display:flex;align-items:center;gap:5px;}
    .dp-val{color:var(--text);font-weight:600;font-family:'Courier New',monospace;font-size:0.77rem;text-align:right;max-width:135px;}
    .sbadge{padding:3px 9px;border-radius:99px;font-size:0.71rem;font-weight:600;}
    .s-on {background:rgba(74,222,128,0.12); color:var(--green); border:1px solid rgba(74,222,128,0.25);}
    .s-mv {background:rgba(251,191,36,0.12);  color:var(--amber); border:1px solid rgba(251,191,36,0.25);}
    .s-off{background:rgba(71,85,105,0.2);    color:var(--dim);   border:1px solid rgba(71,85,105,0.3);}

    /* LEGEND */
    .legend{
      position:absolute; bottom:20px; right:16px;
      background:rgba(12,20,40,0.88); border:1px solid var(--border);
      border-radius:14px; padding:12px 16px; backdrop-filter:blur(16px); z-index:700;
    }
    .legend h4{font-size:0.65rem;text-transform:uppercase;letter-spacing:0.08em;color:var(--dim);margin-bottom:8px;}
    .leg-item{display:flex;align-items:center;gap:8px;font-size:0.77rem;color:var(--muted);margin-bottom:5px;}
    .leg-item:last-child{margin-bottom:0;}
    .leg-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0;}

    /* TRACKER LINK PANEL */
    .tracker-link{
      position:absolute; bottom:20px; left:16px;
      background:rgba(12,20,40,0.88); border:1px solid rgba(129,140,248,0.3);
      border-radius:14px; padding:12px 16px; backdrop-filter:blur(16px); z-index:700;
      max-width:260px;
    }
    .tracker-link h4{font-size:0.7rem;text-transform:uppercase;letter-spacing:0.06em;color:var(--accent);margin-bottom:6px;}
    .tracker-link-url{font-size:0.71rem;color:var(--muted);font-family:'Courier New',monospace;word-break:break-all;line-height:1.4;}
    .btn-tl{
      margin-top:8px; width:100%; padding:7px;
      background:rgba(99,102,241,0.12); border:1px solid rgba(129,140,248,0.25);
      border-radius:8px; color:var(--accent); font-family:'Inter',sans-serif;
      font-size:0.75rem; font-weight:600; cursor:pointer; transition:all 0.2s;
    }
    .btn-tl:hover{background:rgba(99,102,241,0.22);}

    /* LEAFLET */
    .leaflet-container{background:#060c1a;}
    @keyframes mglow {0%,100%{box-shadow:0 0 0 3px rgba(74,222,128,.3);}50%{box-shadow:0 0 0 8px rgba(74,222,128,0);}}
    @keyframes mglowA{0%,100%{box-shadow:0 0 0 3px rgba(251,191,36,.4);}50%{box-shadow:0 0 0 9px rgba(251,191,36,0);}}
  </style>
</head>
<body>

<header>
  <div class="logo-wrap">
    <span class="logo-icon-h">📡</span>
    <span class="logo-text">PhoneTracker</span>
  </div>
  <div class="hdiv"></div>
  <div class="stat-pills">
    <div class="pill">
      <div class="pill-dot" style="background:#4ade80;box-shadow:0 0 5px rgba(74,222,128,.7);animation:sdot 2s infinite"></div>
      <span id="h-online">0 en ligne</span>
    </div>
    <div class="pill">📱 <span id="h-total">0 appareils</span></div>
    <div class="pill">🏙️ <span id="h-cities">0 villes</span></div>
  </div>
  <div class="live-clock" id="clock">00:00:00</div>
  <button class="btn-h btn-h-secondary" onclick="copyTrackerLink()">📤 Lien tracker</button>
  <button class="btn-h btn-h-primary"   onclick="centerAll()">🗺️ Vue globale</button>
</header>

<div class="layout">
  <aside class="sidebar">
    <div class="sidebar-top">
      <div class="search-wrap">
        <span class="search-icon">🔍</span>
        <input type="text" placeholder="Rechercher…" id="search" oninput="renderList()"/>
      </div>
      <div class="filters">
        <button class="fchip active" onclick="setFilter('all',this)">Tous</button>
        <button class="fchip"        onclick="setFilter('online',this)">En ligne</button>
        <button class="fchip"        onclick="setFilter('moving',this)">En mouv.</button>
        <button class="fchip"        onclick="setFilter('offline',this)">Hors ligne</button>
      </div>
    </div>
    <div class="device-list" id="device-list">
      <div class="empty-state">
        <span class="ei">📡</span>
        En attente d'appareils…<br/>
        Envoyez le lien <strong>tracker.html</strong><br/>
        aux personnes à suivre.
      </div>
    </div>
  </aside>

  <div class="map-area">
    <div id="map"></div>

    <div class="detail-panel" id="dp">
      <div class="dp-head">
        <span class="dp-emoji" id="dp-emoji">📱</span>
        <span class="dp-name"  id="dp-name">—</span>
        <div class="dp-close" onclick="closeDetail()">✕</div>
      </div>
      <div id="dp-rows"></div>
    </div>

    <div class="legend">
      <h4>Légende</h4>
      <div class="leg-item"><div class="leg-dot" style="background:#4ade80;box-shadow:0 0 6px rgba(74,222,128,.5)"></div>En ligne</div>
      <div class="leg-item"><div class="leg-dot" style="background:#fbbf24;box-shadow:0 0 6px rgba(251,191,36,.5)"></div>En mouvement</div>
      <div class="leg-item"><div class="leg-dot" style="background:#475569"></div>Hors ligne</div>
    </div>

    <div class="tracker-link" id="tl-panel">
      <h4>🔗 Lien de suivi</h4>
      <div class="tracker-link-url" id="tl-url">Chargement…</div>
      <button class="btn-tl" onclick="copyTrackerLink()">📋 Copier</button>
    </div>
  </div>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
firebase.initializeApp(firebaseConfig);
const db = firebase.database();

// Construire l'URL du tracker
const base = window.location.href.replace('index.html','').replace(/\/$/, '');
const trackerUrl = base + '/tracker.html';
document.getElementById('tl-url').textContent = trackerUrl;

function copyTrackerLink() {
  navigator.clipboard.writeText(trackerUrl).then(() => {
    const btn = event?.target;
    if (btn) { btn.textContent = '✅ Copié !'; setTimeout(() => btn.textContent = '📋 Copier', 2000); }
  });
}

// MAP
const map = L.map('map', { center: [46.8, 2.3], zoom: 6, zoomControl: false });
L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
  attribution: '© OpenStreetMap © CartoDB', subdomains: 'abcd', maxZoom: 19
}).addTo(map);
L.control.zoom({ position: 'bottomleft' }).addTo(map);

const pStyle = document.createElement('style');
pStyle.textContent = `.dpopup .leaflet-popup-content-wrapper{background:rgba(12,20,40,.95)!important;border:1px solid rgba(255,255,255,.1)!important;border-radius:14px!important;box-shadow:0 8px 32px rgba(0,0,0,.5)!important;color:#f1f5f9!important;font-family:'Inter',sans-serif!important;}.dpopup .leaflet-popup-tip{background:rgba(12,20,40,.95)!important;}.dpopup .leaflet-popup-close-button{color:#94a3b8!important;}`;
document.head.appendChild(pStyle);

let devices = {}, markers = {}, currentFilter = 'all', selectedId = null;

// FIREBASE LISTENER
db.ref('devices').on('value', snap => {
  devices = snap.val() || {};
  refreshMarkers();
  renderList();
  updateHeader();
});

function createMarkerIcon(dev) {
  const mv = dev.status === 'moving';
  const on = dev.status === 'online' || mv;
  const col  = mv ? '#fbbf24' : on ? '#4ade80' : '#475569';
  const glow = mv ? 'rgba(251,191,36,.5)' : on ? 'rgba(74,222,128,.5)' : 'transparent';
  const anim = mv ? 'mglowA 1.4s ease-in-out infinite' : on ? 'mglow 2s ease-in-out infinite' : 'none';
  return L.divIcon({
    className: '',
    html: `<div style="display:flex;flex-direction:column;align-items:center;gap:4px;pointer-events:none">
      <div style="background:rgba(12,20,40,.92);border:1px solid rgba(255,255,255,.12);border-radius:10px;padding:4px 9px;font-size:.7rem;font-family:Inter,sans-serif;font-weight:600;color:#f1f5f9;white-space:nowrap;backdrop-filter:blur(12px);box-shadow:0 3px 14px rgba(0,0,0,.45);display:flex;align-items:center;gap:5px">
        <span>${dev.emoji||'📱'}</span><span>${dev.name||'?'}</span>
      </div>
      <div style="width:13px;height:13px;background:${col};border-radius:50%;border:2px solid rgba(255,255,255,.75);animation:${anim};box-shadow:0 0 0 3px ${glow};"></div>
      <div style="width:2px;height:7px;background:${col};opacity:.4;border-radius:1px;margin-top:-3px;"></div>
    </div>`,
    iconSize: [120, 50], iconAnchor: [60, 50], popupAnchor: [0, -54]
  });
}

function refreshMarkers() {
  Object.keys(markers).forEach(id => { if (!devices[id]) { map.removeLayer(markers[id]); delete markers[id]; } });
  Object.entries(devices).forEach(([id, dev]) => {
    if (!dev.lat || !dev.lng) return;
    const popup = `<div style="padding:4px 2px;min-width:155px">
      <div style="font-weight:700;font-size:.9rem;margin-bottom:7px">${dev.emoji||'📱'} ${dev.name||'?'}</div>
      <div style="font-size:.79rem;color:#94a3b8;margin-bottom:4px">📍 ${dev.city||'Inconnue'}</div>
      <div style="font-size:.77rem;color:#94a3b8;margin-bottom:4px">🔋 ${dev.battery!==undefined?dev.battery+'%':'—'} | 🚗 ${dev.speed>0?dev.speed+' km/h':'Arrêt'}</div>
      <div style="font-size:.7rem;color:#475569;font-family:'Courier New',monospace">${dev.lat?.toFixed(5)}, ${dev.lng?.toFixed(5)}</div>
    </div>`;
    if (markers[id]) {
      markers[id].setLatLng([dev.lat, dev.lng]);
      markers[id].setIcon(createMarkerIcon(dev));
      markers[id].getPopup().setContent(popup);
    } else {
      const m = L.marker([dev.lat, dev.lng], { icon: createMarkerIcon(dev) })
        .bindPopup(popup, { className: 'dpopup', maxWidth: 210 }).addTo(map);
      m.on('click', () => selectDevice(id));
      markers[id] = m;
    }
  });
}

function renderList() {
  const q = (document.getElementById('search').value||'').toLowerCase();
  const list = document.getElementById('device-list');
  let filtered = Object.entries(devices).filter(([id,dev]) => {
    const mf = currentFilter==='all' || dev.status===currentFilter;
    const mq = !q || (dev.name||'').toLowerCase().includes(q) || (dev.city||'').toLowerCase().includes(q);
    return mf && mq;
  });
  filtered.sort((a,b) => ({moving:0,online:1,offline:2}[a[1].status||'offline']||1) - ({moving:0,online:1,offline:2}[b[1].status||'offline']||1));

  if (!filtered.length) {
    list.innerHTML = `<div class="empty-state"><span class="ei">🔍</span>Aucun appareil trouvé</div>`;
    return;
  }
  list.innerHTML = filtered.map(([id,dev]) => {
    const bc = !dev.battery?'#475569':dev.battery>50?'#4ade80':dev.battery>20?'#fbbf24':'#f87171';
    return `<div class="dcard ${selectedId===id?'selected':''}" onclick="selectDevice('${id}')">
      <div class="dcard-top">
        <div class="d-avatar">${dev.emoji||'📱'}</div>
        <div class="d-info">
          <div class="d-name">${dev.name||'Inconnu'}</div>
          <div class="d-city">📍 ${dev.city||'Inconnue'}${dev.status==='moving'?`<span style="color:var(--amber);margin-left:6px">🚗 ${dev.speed||0} km/h</span>`:''}</div>
        </div>
        <div class="d-sdot ${dev.status||'offline'}"></div>
      </div>
      <div class="dcard-bottom">
        <div class="bat-wrap"><div class="bat-fill" style="width:${dev.battery||0}%;background:${bc}"></div></div>
        <div class="d-meta">
          ${dev.battery!==undefined?`<div class="d-meta-item">🔋 ${dev.battery}%${dev.charging?'⚡':''}</div>`:''}
          <div class="d-meta-item">🎯 ${dev.accuracy||'?'}m</div>
        </div>
      </div>
    </div>`;
  }).join('');
}

function updateHeader() {
  const all = Object.values(devices);
  document.getElementById('h-total').textContent  = all.length + ' appareil' + (all.length!==1?'s':'');
  document.getElementById('h-online').textContent = all.filter(d=>d.status!=='offline').length + ' en ligne';
  document.getElementById('h-cities').textContent = [...new Set(all.map(d=>d.city).filter(Boolean))].length + ' villes';
}

function selectDevice(id) {
  selectedId = id;
  const dev = devices[id];
  if (!dev) return;
  map.flyTo([dev.lat,dev.lng], 15, { duration:1.4, easeLinearity:.2 });
  markers[id]?.openPopup();

  document.getElementById('dp-emoji').textContent = dev.emoji||'📱';
  document.getElementById('dp-name').textContent  = dev.name||'Inconnu';
  const sc = dev.status==='online'?'s-on':dev.status==='moving'?'s-mv':'s-off';
  const st = dev.status==='online'?'● En ligne':dev.status==='moving'?'↗ En mouv.':'○ Hors ligne';
  document.getElementById('dp-rows').innerHTML =
    `<div class="dp-row"><span class="dp-lbl">⚡ Statut</span><span class="sbadge ${sc}">${st}</span></div>` +
    [['📍','Ville',dev.city||'Inconnue'],['🌐','Latitude',(dev.lat?.toFixed(6)||'—')],
     ['🌐','Longitude',(dev.lng?.toFixed(6)||'—')],['🎯','Précision',(dev.accuracy||'?')+' m'],
     ['🚗','Vitesse',dev.speed>0?dev.speed+' km/h':'À l\'arrêt'],
     ['🔋','Batterie',dev.battery!==undefined?dev.battery+'%'+(dev.charging?' ⚡':''):'N/A'],
     ['🕒','Mis à jour',dev.lastSeen?new Date(dev.lastSeen).toLocaleTimeString('fr-FR'):'—']
    ].map(([i,l,v])=>`<div class="dp-row"><span class="dp-lbl">${i} ${l}</span><span class="dp-val">${v}</span></div>`).join('');
  document.getElementById('dp').classList.add('open');
  renderList();
}

function closeDetail() {
  document.getElementById('dp').classList.remove('open');
  selectedId = null; renderList();
}

function setFilter(f, btn) {
  currentFilter = f;
  document.querySelectorAll('.fchip').forEach(c=>c.classList.remove('active'));
  btn.classList.add('active'); renderList();
}

function centerAll() {
  const pts = Object.values(devices).filter(d=>d.lat&&d.lng);
  if (!pts.length) return;
  if (pts.length===1) { map.flyTo([pts[0].lat,pts[0].lng],13); return; }
  map.flyToBounds(L.latLngBounds(pts.map(d=>[d.lat,d.lng])), { padding:[60,60], duration:1.4 });
  closeDetail();
}

// Clock
setInterval(() => document.getElementById('clock').textContent = new Date().toLocaleTimeString('fr-FR'), 1000);
document.getElementById('clock').textContent = new Date().toLocaleTimeString('fr-FR');

// Auto-offline après 5 min
setInterval(() => {
  const now = Date.now();
  Object.entries(devices).forEach(([id,dev]) => {
    if (dev.lastSeen && (now-dev.lastSeen)>300000 && dev.status!=='offline')
      db.ref('devices/'+id+'/status').set('offline');
  });
}, 30000);
</script>
